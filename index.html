<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>小游戏</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #c8f0f0;
      color: #1a1a2e;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* 顶部标题栏 */
    header {
      width: 100%;
      padding: 32px 0 16px;
      text-align: center;
    }

    header h1 {
      font-size: 2.4rem;
      font-weight: 900;
      letter-spacing: 4px;
      background: linear-gradient(135deg, #a78bfa, #60a5fa, #34d399);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    header p {
      margin-top: 8px;
      font-size: 0.95rem;
      color: #6b7280;
      letter-spacing: 2px;
    }

    /* 游戏卡片区域 */
    .game-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 28px;
      padding: 48px 24px;
      max-width: 1100px;
      width: 100%;
    }

    /* 单个游戏卡片 */
    .game-card {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 20px;
      width: 280px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
      text-decoration: none;
      color: inherit;
      display: block;
    }

    .game-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 16px 48px rgba(167, 139, 250, 0.25);
      border-color: #a78bfa;
    }

    /* 卡片封面图区域 */
    .card-cover {
      width: 100%;
      height: 160px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 5rem;
      background: linear-gradient(135deg, #1e1b4b, #312e81);
      position: relative;
      overflow: hidden;
    }

    .card-cover::before {
      content: "";
      position: absolute;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(167,139,250,0.15), transparent 70%);
      top: -40px;
      right: -40px;
    }

    /* 卡片文字信息 */
    .card-info {
      padding: 20px;
    }

    .card-info h2 {
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 8px;
      color: #e2e8f0;
    }

    .card-info p {
      font-size: 0.85rem;
      color: #94a3b8;
      line-height: 1.6;
      margin-bottom: 16px;
    }

    /* 标签 */
    .card-tags {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .tag {
      font-size: 0.72rem;
      padding: 3px 10px;
      border-radius: 999px;
      background: #2d2b55;
      color: #a78bfa;
      border: 1px solid #4c3d8a;
    }

    /* 开始按钮 */
    .btn-play {
      display: block;
      width: 100%;
      padding: 10px 0;
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      color: #fff;
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 2px;
      cursor: pointer;
      text-align: center;
      transition: opacity 0.2s;
    }

    .btn-play:hover {
      opacity: 0.88;
    }

    /* 底部 */
    footer {
      margin-top: auto;
      padding: 24px;
      color: #374151;
      font-size: 0.8rem;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

  <header>
    <h1>小游戏</h1>
    <p>选择一款游戏，开始冒险</p>
  </header>

  <div class="game-grid">

    <!-- 游戏1：割草进化 -->
    <a class="game-card" href="mow.html">
      <div class="card-cover">⚔️</div>
      <div class="card-info">
        <h2>割草进化</h2>
        <p>消灭涌来的敌人，叠加属性，挑战更高的塔层！</p>
        <div class="card-tags">
          <span class="tag">割草</span>
          <span class="tag">爬塔</span>
          <span class="tag">Roguelite</span>
        </div>
        <div class="btn-play">开始游戏</div>
      </div>
    </a>

    <!-- 游戏2：数字爬塔 -->
    <a class="game-card" href="tower.html">
      <div class="card-cover">🗺️</div>
      <div class="card-info">
        <h2>数字爬塔</h2>
        <p>探索地图、找宝箱打小怪，数字滚雪球，够大就击败首领过关！</p>
        <div class="card-tags">
          <span class="tag">2.5D</span>
          <span class="tag">探索</span>
          <span class="tag">数字</span>
        </div>
        <div class="btn-play">开始游戏</div>
      </div>
    </a>

  </div>

  <footer>© 2026 小游戏 · 持续更新中</footer>

</body>
</html>
